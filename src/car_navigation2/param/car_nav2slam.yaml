bt_navigator_navigate_through_poses_rclcpp_node:  #行为树导航器的navigate_through_poses节点，使用行为树实现根据预设的航点序列进行导航的功能。 用于根据预设的航点序列进行导航，并在每个航点停留一定时间
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node: #行为树导航器的navigate_to_pose节点，使用行为树实现根据目标位置进行导航的功能。 用于根据目标位置进行导航，并在到达目标位置后停留一定时间
  ros__parameters:
    use_sim_time: True

controller_server: # 控制器服务器
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
      
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35 
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      
      # --- 速度配置 ---
      desired_linear_vel: 1.2 
      max_robot_pose_search_dist: 10.0 
      
      # --- 前瞻距离配置 ---
      use_velocity_scaled_lookahead_dist: true 
      lookahead_time: 0.5       # 缩短视距，盯着眼前的弯
      min_lookahead_dist: 0.35    
      max_lookahead_dist: 0.55   
      
      # --- 降速与防碰撞安全机制 ---
      use_collision_detection: true 
      max_allowed_time_to_collision_up_to_carrot: 1.0 
      
      # 【核心修改点】必须开启！让小车入弯时懂得带一脚刹车，防止冲过头倒车
      use_regulated_linear_velocity_scaling: true 
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9 
      regulated_linear_scaling_min_speed: 0.2 # 弯道最低兜底速度，保证不墨迹（调低，避免因慢速被判为不前进）
      
      # --- 终点停靠机制 ---
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6 
      
      # ====== 解决撞墙的终极魔法参数 ======
      use_rotate_to_heading: true # 允许原地掉头
      allow_reversing: false      # 严禁倒车
      
      # 偏角大于约20度时，停下原地打转对准路线
      rotate_to_heading_min_angle: 0.35 # 约20°时原地转向（从45°降到20°，更早触发原地转向以避免倒退）
      
      # 原地转向极速与加速度
      rotate_to_heading_angular_vel: 2.5 
      max_angular_accel: 3.5 
      
      transform_tolerance: 0.2

local_costmap: # 局部代价地图
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom 
      robot_base_frame: base_footprint
      use_sim_time: True
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      
      # 【核心修改点】删除 robot_radius，启用精确的长方形轮廓 (0.76m x 0.09m)
      footprint: "[ [0.38, -0.045], [-0.38, -0.045], [-0.38, 0.045], [0.38, 0.045] ]"
      track_unknown_space: true

      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # 缩小膨胀安全区，允许小车在狭窄走廊穿行
        inflation_radius: 0.25 
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
      always_send_full_costmap: True

global_costmap: # 全局代价地图
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: True

      # 【核心修改点】同步全局长方形轮廓
      footprint: "[ [0.38, -0.045], [-0.38, -0.045], [-0.38, 0.045], [0.38, 0.045] ]"

      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # 同步全局膨胀半径
        inflation_radius: 0.25  
      always_send_full_costmap: True



map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "/home/huang/four_wheeled_car/src/car_navigation2/maps/car1_map.yaml"
    autostart: True
    map_subscribe_transient_local: True
    topic_name: map

map_saver:  #地图保存器，用于将当前环境的地图信息保存到文件中。 用于在仿真或实际环境中保存和加载地图数据
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server: #规划器服务器，使用具有运动学感知能力的 Smac 算法
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    
    GridBased:
      # 【核心修改 1】启用 Smac Hybrid 规划器（支持非完整约束和多边形碰撞检测）
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      
      # 【核心修改 2】运动学模型配置
      # DUBIN 代表只规划“前进”路线（完美配合我们之前 RPP 控制器里的 allow_reversing: false）
      motion_model_for_search: "DUBIN" 
      
      # 【核心修改 3】最小转弯半径 (极度关键)
      # 因为你的底盘支持原地坦克掉头，所以转弯半径可以设得极小（例如5厘米）。
      # 这样 Smac 会规划出极窄的直角弯，然后交由 RPP 执行“停车->原地打转->直行”的完美过弯！
      minimum_turning_radius: 0.05 
      
      # 【核心修改 4】角度分辨率
      # 将 360 度切分为 72 份（每 5 度计算一次碰撞）。
      # 对于长达 0.75m 的面条形小车，精确的角度碰撞检测是它能在迷宫存活的根本！
      angle_quantization_bins: 72
      
      # --- 路径平滑与惩罚权重（让小车尽量走畅快的直线，避免无意义的扭动） ---
      reverse_penalty: 2.0         # 倒车惩罚（当前使用 DUBIN 模型，不生效）
      change_penalty: 0.1          # 改变方向惩罚（比如左转立刻右转）
      non_straight_penalty: 2.0    # 非直线行驶惩罚
      cost_penalty: 3.0            # 靠近障碍物的惩罚权重
      retrospective_penalty: 0.0

smoother_server: #平滑器服务器，用于对生成的路径进行平滑处理。 用于提高路径的平滑度和机器人的行驶舒适性
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server: #行为服务器，使用行为树实现导航行为的调度和执行。 用于根据当前状态和目标位置选择合适的导航行为并执行
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin: #旋转行为，使用行为树实现当机器人需要旋转时的功能。 用于当机器人需要旋转时执行旋转行为，例如在调整姿态或避障时进行旋转操作
      plugin: "nav2_behaviors/Spin"
    backup: #后退行为，使用行为树实现当机器人需要后退时的功能。 用于当机器人需要后退时执行后退行为，例如在遇到障碍物或被困时进行后退操作
      plugin: "nav2_behaviors/BackUp"
      enabled: false  # 禁用自动后退行为，避免将前方目标误判为需要倒退
    drive_on_heading: #沿直线移动行为，使用行为树实现当机器人需要沿直线移动时的功能。 用于当机器人需要沿直线移动时执行该行为
      plugin: "nav2_behaviors/DriveOnHeading"
    wait: #等待行为，使用行为树实现当机器人需要等待时的功能。 用于当机器人需要等待时执行等待行为，例如在到达目标位置后停留一定时间
      plugin: "nav2_behaviors/Wait"
    assisted_teleop: #沿直线移动脱困行为，使用行为树实现当机器人被困时沿直线移动脱困的功能。 用于当机器人被困时沿直线移动脱困，帮助机器人恢复正常导航
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher: # 机器人状态发布器，用于发布机器人的状态信息。 用于将机器人的状态信息发布到ROS系统中，供其他节点使用
  ros__parameters:
    use_sim_time: True

waypoint_follower: #航点跟随器，使用行为树实现根据预设的航点序列进行导航的功能。 用于根据预设的航点序列进行导航，并在每个航点停留一定时间
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother: #速度平滑器，用于对生成的速度命令进行平滑处理。 用于提高机器人的行驶平稳性和舒适性
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
   # [核心修改] 把平滑器的最大限速提高，必须大于或等于你 RPP 里的速度！
    max_velocity: [1.5, 0.0, 3.0]  # 直行放宽到1.5，转弯放宽到3.0
    # 阻止平滑器输出负线速度，从而避免在控制器出错时产生倒车指令
    min_velocity: [-1.5, 0.0, -3.0]
    
    # [核心修改] 加速度也必须放开，否则起步会像老爷爷一样慢
    max_accel: [3.0, 0.0, 4.0]
    max_decel: [-3.0, 0.0, -4.0]
    
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0